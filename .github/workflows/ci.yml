name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - run: uv run pytest -q

  pipeline-smoke:
    # L1 of the pipeline-correctness ladder. Catches the "pytest is green
    # but the pipeline can't load plugins" class of failure that unit tests
    # miss by design. Runs in <10s.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
      - run: uv sync --extra full
      - run: uv run pytest tests/pipeline/ -m pipeline_smoke -v

  canonical-reproductions:
    # L2 of the pipeline-correctness ladder. Runs end-to-end backtests on
    # the bundled synthetic fixture and diffs headline metrics against
    # committed goldens. Catches silent numerical drift from
    # pandas/vbt/numba bumps. Runs in ~30s.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
      - run: uv sync --extra full
      - run: uv run pytest tests/canonical_reproductions/ -m canonical_reproduction -v
