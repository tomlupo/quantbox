name: version-consistency

# Release-hygiene guardrail. Recent releases were cut by hand-tagging the tip
# commit (`git tag vX.Y.Z`) instead of running `cz bump`, so the declared
# version strings drifted from the tag (v0.3.12 tag shipped with __version__
# 0.3.9 / pyproject 0.3.11). This job fails the release if the version strings
# in the tagged commit don't match the tag, catching the hand-tag mistake.
# The durable fix is to always release via `cz bump` (the `ship` skill), which
# advances version_files + tags atomically — this is the backstop.

on:
  push:
    tags: ['v*']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Declared version must match the tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          py=$(grep -m1 -E '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)".*/\1/')
          init=$(grep -m1 '__version__' src/quantbox/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$tag  pyproject=$py  __version__=$init"
          fail=0
          if [ "$py" != "$tag" ]; then
            echo "::error::pyproject.toml version ($py) != tag ($tag) — cut the release with 'cz bump', don't hand-tag"
            fail=1
          fi
          if [ "$init" != "$tag" ]; then
            echo "::error::src/quantbox/__init__.py __version__ ($init) != tag ($tag) — cut the release with 'cz bump', don't hand-tag"
            fail=1
          fi
          exit $fail
