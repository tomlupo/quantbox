# Quantbox Binance Account Configuration
# Token policy: allowlist mode (safer - new tokens require explicit approval)

account_name: "binance"
exchange: "binance"
base_currency: "USDC"

# Data configuration
lookback_days: 365
top_coins: 100

# Strategy configuration
strategies:
  - name: "crypto_trend_catcher"
    weight: 1.0

# Risk management
max_leverage: 1.0
min_trade_size: 0.01

# =============================================================================
# TOKEN POLICY - Allowlist mode (opt-in, safer than quantlab's opt-out)
# =============================================================================
token_policy:
  mode: "allowlist"           # Only trade tokens explicitly in 'allowed' list
  alert_on_new: true          # Alert when new token appears in top_n_monitor
  top_n_monitor: 100          # Monitor top N for new entries
  
  # ---------------------------------------------------------------------------
  # ALLOWED TOKENS - Can be traded
