# Live spot paper-trading config for strategy.crypto_trend.v1 (SSRN paper port).
#
# NOTE on paper-vs-live drift: the SSRN paper recommends fees=0.005,
# tranches=5, threshold=0.05. This live config uses different settings
# (tranches=1, no threshold) because:
#   * trading_pipeline.v1 handles rebalance pacing differently from the
#     backtest engine and applies live order shaping on top.
#   * strategy.crypto_trend.v1 returns the (vol_target=50, tranche=5)
#     slice through get_simple_weights() — the paper variant is baked into
#     simple_weights regardless of the outer risk.tranches setting.
# See cookbook/configs/run_backtest_crypto_trend.yaml for paper-faithful
# backtest defaults, and quantbox-lab/configs/run_backtest_crypto_trend_ssrn.yaml
# for the full multi-variant research report.
run:
  mode: paper
  asof: "2026-02-06"
  pipeline: "trade.full_pipeline.v1"

artifacts:
  root: "./artifacts"

plugins:
  profile: "trading"

  pipeline:
    name: "trade.full_pipeline.v1"
    params:
      capital_at_risk: 1.0
      stable_coin_symbol: USDT
      trading_enabled: true

      universe:
        top_n: 100
        token_policy_file: "config/accounts/binance.yaml"

      prices:
        lookback_days: 365

  strategies:
    - name: "strategy.crypto_trend.v1"
      weight: 1.0
      params:
        lookback_days: 365

  aggregator:
    name: "strategy.weighted_avg.v1"
    params: {}

  rebalancing:
    name: "rebalancing.standard.v1"
    params:
      tranches: 1
      max_leverage: 1
      min_trade_size: 0.01

  data:
    name: "binance.live_data.v1"
    params_init:
      quote_asset: USDT

  broker:
    name: "sim.paper.v1"
    params_init:
      cash: 100000.0

  risk:
    - name: "risk.trading_basic.v1"
      params:
        max_leverage: 1.0
        max_concentration: 0.30
        allow_negative_weights: false
        min_notional: 1.0
